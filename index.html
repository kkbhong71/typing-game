<!DOCTYPE html>

<meta charset="UTF-8">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  :root {
    --bg-deep: #0b0e17;
    --bg-card: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.07);

    --green: #22c55e;

    --blue: #38bdf8;
    --blue-glow: rgba(56,189,248,0.25);
    --red: #f87171;
    --red-glow: rgba(248,113,113,0.25);
    --gold: #fbbf24;
    --gold-glow: rgba(251,191,36,0.25);
    --orange: #fb923c;
    --purple: #a78bfa;

  body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image: 
      radial-gradient(circle at 20% 30%, rgba(34,197,94,0.03) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(56,189,248,0.03) 0%, transparent 50%);
    pointer-events: none;
  }

  #root {
    position: relative; z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 16px;
    min-height: 100vh;
  }

  /* ── Shared ── */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 28px;
    border-radius: 14px;
    border: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px; font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-appearance: none;
  }
  .btn:active { transform: scale(0.96); }

  .btn-primary {
    background: linear-gradient(135deg, var(--green), #16a34a);
    color: #fff;
    box-shadow: 0 4px 20px var(--green-glow);
  }
  .btn-secondary {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-danger {
    background: linear-gradient(135deg, var(--red), #dc2626);
    color: #fff;
    box-shadow: 0 4px 20px var(--red-glow);
  }

  .text-input {
    width: 100%;
    padding: 16px 20px;
    font-size: 20px;
    font-family: 'Noto Sans KR', sans-serif;
    background: rgba(255,255,255,0.05);
    border: 2px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    outline: none;
    text-align: center;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .text-input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px var(--green-glow);
  }
  .text-input::placeholder { color: var(--text-dim); }

  .stat-row {
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .stat-badge {
    padding: 6px 14px; border-radius: 10px;
    text-align: center; min-width: 72px;
  }
  .stat-badge .label { font-size: 10px; color: var(--text-dim); margin-bottom: 2px; }
  .stat-badge .value { font-size: 15px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

  .progress-bar {
    height: 5px; border-radius: 3px;
    background: rgba(255,255,255,0.06);
    overflow: hidden; margin-bottom: 20px;
  }
  .progress-bar .fill {
    height: 100%; border-radius: 3px;
    transition: width 0.3s;
  }

  /* Animations */
  @keyframes fadeInUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pop { 0% { transform:scale(0.7); opacity:0; } 60% { transform:scale(1.05); } 100% { transform:scale(1); opacity:1; } }
  @keyframes floatUp { from { transform:translateY(0); opacity:1; } to { transform:translateY(-50px); opacity:0; } }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
  @keyframes shake { 0%,100% { transform:translateX(0); } 25% { transform:translateX(-4px); } 75% { transform:translateX(4px); } }

  .anim-up { animation: fadeInUp 0.4s ease both; }
  .anim-pop { animation: pop 0.35s ease both; }
  .anim-shake { animation: shake 0.3s ease; }

  /* Mobile adjustments */
  @media (max-width: 480px) {
    #root { padding: 10px; }
    .card { padding: 14px; border-radius: 12px; }
    .btn { padding: 12px 20px; font-size: 15px; }
    .text-input { font-size: 18px; padding: 14px 16px; }
    .stat-badge { min-width: 60px; padding: 5px 10px; }
    .stat-badge .value { font-size: 13px; }
  }
</style>
</head>

const shuffle = (arr) => { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };

const getKoreanStrokes = (str) => {
  let c = 0;
  for (const ch of str) {
    const code = ch.charCodeAt(0);
    if (code >= 0xAC00 && code <= 0xD7A3) {
      c += ((code - 0xAC00) % 28 === 0) ? 2 : 3;
    } else if ((code>=0x3131&&code<=0x314E)||(code>=0x314F&&code<=0x3163)) {
      c += 1;
    } else { c += 1; }
  }
  return c;
};

// ═══════════════════════════════════════
//  APP
// ═══════════════════════════════════════
function App() {
  const [screen, setScreen] = useState("welcome"); // welcome, menu, word, sentence, falling, result
  const [difficulty, setDifficulty] = useState("easy");
  const [stats, setStats] = useState({});
  const [studentName, setStudentName] = useState(() => localStorage.getItem("typing_name") || "");
  const [bestScores, setBestScores] = useState(() => {
    try { return JSON.parse(localStorage.getItem("typing_best") || "{}"); } catch { return {}; }
  });

  const saveName = (name) => {
    setStudentName(name);
    localStorage.setItem("typing_name", name);
  };

  const saveBest = (mode, score) => {
    const key = mode + "_" + difficulty;
    const prev = bestScores[key] || 0;
    if (score > prev) {
      const next = { ...bestScores, [key]: score };
      setBestScores(next);
      localStorage.setItem("typing_best", JSON.stringify(next));
      return true;
    }
    return false;
  };

  const startGame = (mode) => {
    setStats({ score:0, correct:0, wrong:0, totalChars:0, startTime:Date.now(), lastMode:mode });
    setScreen(mode);
  };

  const endGame = (finalStats) => {
    const newRecord = saveBest(finalStats.lastMode, finalStats.score);
    setStats({ ...finalStats, newRecord });
    setScreen("result");
  };

  return (
    <div>
      {screen === "welcome" && <WelcomeScreen name={studentName} onSaveName={saveName} onStart={() => setScreen("menu")} />}
      {screen === "menu" && <MenuScreen onStart={startGame} difficulty={difficulty} setDifficulty={setDifficulty} name={studentName} bestScores={bestScores} currentDiff={difficulty} />}
      {screen === "word" && <WordMode difficulty={difficulty} onEnd={endGame} stats={stats} setStats={setStats} />}
      {screen === "sentence" && <SentenceMode onEnd={endGame} stats={stats} setStats={setStats} />}
      {screen === "falling" && <FallingMode difficulty={difficulty} onEnd={endGame} stats={stats} setStats={setStats} />}
      {screen === "result" && <ResultScreen stats={stats} name={studentName} onBack={() => setScreen("menu")} onRetry={() => startGame(stats.lastMode)} />}
    </div>
  );
}

// ═══════════════════════════════════════

// ═══════════════════════════════════════
function WelcomeScreen({ name, onSaveName, onStart }) {

    if (inputName.trim()) onSaveName(inputName.trim());
    onStart();
  };

  return (
    <div style={{ minHeight: "100vh", display:"flex", flexDirection:"column", justifyContent:"center", alignItems:"center", textAlign:"center", padding:"20px" }}>
      {step >= 1 && (
        <div className="anim-up">

          <div style={{
            width:80, height:80, borderRadius:"50%", margin:"0 auto 16px",
            background:"linear-gradient(135deg, var(--green), var(--blue))",
            display:"flex", alignItems:"center", justifyContent:"center",
            fontSize:40, boxShadow:"0 8px 32px var(--green-glow)"
          }}>⌨️</div>

          <h1 style={{
            fontFamily:"'Black Han Sans', sans-serif",
            fontSize:"clamp(28px, 7vw, 44px)",
            background:"linear-gradient(135deg, var(--green), var(--blue))",
            WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent",
            lineHeight:1.3, marginBottom:8
          }}>한글 타자 연습</h1>

          <p style={{ color:"var(--text-dim)", fontSize:14, marginBottom:40 }}>
            오성중학교 타자 마스터에 오신 것을 환영합니다!
          </p>

          {/* Name Input */}
          <div style={{ maxWidth:320, margin:"0 auto 24px" }}>
            <label style={{ display:"block", fontSize:13, color:"var(--text-dim)", marginBottom:8, textAlign:"left" }}>
              이름 또는 별명을 입력하세요 (선택)
            </label>
            <input
              className="text-input"
              value={inputName}
              onChange={e => setInputName(e.target.value)}
              onKeyDown={e => e.key === "Enter" && handleGo()}
              placeholder="예: 홍길동"
              style={{ fontSize:18 }}
              autoFocus
            />
          </div>

          <button className="btn btn-primary" onClick={handleGo}
            style={{ fontSize:18, padding:"16px 48px", borderRadius:16 }}>
            🚀 시작하기
          </button>

          {/* How to play */}
          <div className="card" style={{ maxWidth:400, margin:"40px auto 0", textAlign:"left", fontSize:13, color:"var(--text-dim)", lineHeight:2 }}>
            <div style={{ fontWeight:700, color:"var(--text)", marginBottom:8, fontSize:14 }}>🎮 이용 방법</div>
            <div><strong style={{color:"var(--green)"}}>단어 연습</strong> — 화면에 나오는 단어를 빠르게 입력</div>
            <div><strong style={{color:"var(--blue)"}}>문장 연습</strong> — 문장을 보고 정확하게 따라 입력</div>
            <div><strong style={{color:"var(--red)"}}>낙하 게임</strong> — 떨어지는 단어를 입력해서 없애기!</div>
          </div>
        </div>
      )}
    </div>
  );
}

              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:18, fontWeight:700, color:"var(--text)" }}>{mode.title}</div>
                <div style={{ fontSize:13, color:"var(--text-dim)", marginTop:2 }}>{mode.desc}</div>
                {best > 0 && (
                  <div style={{ fontSize:11, color:"var(--gold)", marginTop:4 }}>🏆 최고 기록: {best.toLocaleString()}점</div>
                )}
              </div>
              <div style={{ color:mode.color, fontSize:22, fontWeight:300, flexShrink:0 }}>›</div>
            </button>
          );
        })}
      </div>

      {/* Tip */}
      <div className="card" style={{ marginTop:28, fontSize:13, color:"var(--text-dim)", lineHeight:1.9 }}>
        💡 <strong style={{ color:"var(--blue)" }}>타자 꿀팁</strong><br/>
        • 키보드의 ㅋ, ㅎ에 검지 손가락을 올려놓으세요 (홈 포지션)<br/>
        • 처음엔 <strong>정확하게</strong>, 익숙해지면 <strong>빠르게</strong>!<br/>
        • 하루 10분이면 한 달 뒤 달라진 실력을 느낄 수 있어요
      </div>
    </div>
  );
}

// ═══════════════════════════════════════
//  HEADER & STAT BADGE (shared)
// ═══════════════════════════════════════
function GameHeader({ title, icon, color, onBack }) {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:16 }}>
      <button className="btn btn-secondary" onClick={onBack} style={{ padding:"8px 14px", fontSize:14 }}>← 나가기</button>
      <span style={{ fontSize:22 }}>{icon}</span>
      <span style={{ fontSize:18, fontWeight:700, color }}>{title}</span>
    </div>
  );
}

function StatBadge({ label, value, color }) {
  return (
    <div className="stat-badge" style={{ background:`${color}10`, border:`1px solid ${color}25` }}>
      <div className="label">{label}</div>
      <div className="value" style={{ color }}>{value}</div>
    </div>
  );
}

// ═══════════════════════════════════════
//  WORD MODE
// ═══════════════════════════════════════
function WordMode({ difficulty, onEnd, stats, setStats }) {
  const pool = WORDS[difficulty].words;
  const total = 25;
  const [words] = useState(() => { const s=[]; while(s.length<total) s.push(...shuffle(pool)); return s.slice(0,total); });
  const [idx, setIdx] = useState(0);
  const [input, setInput] = useState("");
  const [timeLeft, setTimeLeft] = useState(60);
  const [results, setResults] = useState([]);
  const [msg, setMsg] = useState("");
  const inputRef = useRef(null);

  useEffect(() => { inputRef.current?.focus(); }, []);
  useEffect(() => {
    if (timeLeft <= 0) { finish(); return; }
    const t = setTimeout(() => setTimeLeft(p => p-1), 1000);
    return () => clearTimeout(t);
  }, [timeLeft]);

  const finish = () => {
    const elapsed = (Date.now() - stats.startTime) / 60000;
    onEnd({ ...stats, elapsed, lastMode:"word" });
  };

  const submit = () => {
    const v = input.trim();
    if (!v) return;
    const ok = v === words[idx];
    const chars = getKoreanStrokes(v);
    setResults(p => [...p, ok]);
    setStats(p => ({
      ...p,
      totalChars: p.totalChars + (ok ? chars : 0),
      correct: p.correct + (ok?1:0),
      wrong: p.wrong + (ok?0:1),
      score: p.score + (ok ? chars*10 : 0)
    }));
    setMsg(ok ? pick(ENCOURAGE.great) : pick(ENCOURAGE.miss));
    setInput("");
    if (idx+1 >= total) finish();
    else setIdx(p => p+1);
  };

  const elapsed = (Date.now() - stats.startTime) / 60000;
  const cpm = Math.round(stats.totalChars / Math.max(elapsed, 0.01));
  const acc = (stats.correct+stats.wrong)>0 ? Math.round(stats.correct/(stats.correct+stats.wrong)*100) : 100;

  return (
    <div style={{ paddingTop:12 }}>
      <GameHeader title="단어 연습" icon="✏️" color="var(--green)" onBack={finish} />
      <div className="stat-row">
        <StatBadge label="시간" value={`${timeLeft}초`} color={timeLeft<=10?"var(--red)":"var(--green)"} />
        <StatBadge label="타수" value={`${cpm}`} color="var(--blue)" />
        <StatBadge label="정확도" value={`${acc}%`} color="var(--gold)" />
        <StatBadge label="점수" value={stats.score} color="var(--purple)" />
      </div>

      <div className="progress-bar">
        <div className="fill" style={{ width:`${idx/total*100}%`, background:"linear-gradient(90deg, var(--green), var(--blue))" }} />
      </div>

      {/* Word Display */}
      <div style={{ textAlign:"center", margin:"24px 0 16px" }}>
        <div style={{ fontSize:12, color:"var(--text-dim)", marginBottom:8 }}>{idx+1} / {total}</div>
        <div key={idx} className="anim-pop" style={{
          fontSize:"clamp(36px, 10vw, 56px)", fontWeight:900,
          color:"#fff", padding:"20px 0",
          textShadow:"0 0 40px var(--green-glow)"
        }}>
          {words[idx]}
        </div>
        {msg && <div style={{ fontSize:14, color:"var(--gold)", minHeight:24, transition:"all 0.2s" }}>{msg}</div>}
      </div>

      {/* Input */}
      <div style={{ maxWidth:440, margin:"16px auto 0" }}>
        <input ref={inputRef} className="text-input" value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if(e.key==="Enter") submit(); }}
          placeholder="여기에 입력 → Enter"
          autoFocus autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false"
        />
      </div>

      {/* Dots */}
      <div style={{ display:"flex", justifyContent:"center", gap:5, marginTop:20, flexWrap:"wrap" }}>
        {results.slice(-20).map((r,i) => (
          <div key={i} style={{ width:8, height:8, borderRadius:"50%", background:r?"var(--green)":"var(--red)", opacity:0.8 }} />
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════
//  SENTENCE MODE
// ═══════════════════════════════════════
function SentenceMode({ onEnd, stats, setStats }) {
  const [sentences] = useState(() => shuffle(SENTENCES).slice(0,10));
  const [idx, setIdx] = useState(0);
  const [input, setInput] = useState("");
  const [timeLeft, setTimeLeft] = useState(120);
  const inputRef = useRef(null);

  useEffect(() => { inputRef.current?.focus(); }, []);
  useEffect(() => {
    if (timeLeft <= 0) { finish(); return; }
    const t = setTimeout(() => setTimeLeft(p => p-1), 1000);
    return () => clearTimeout(t);
  }, [timeLeft]);

  const finish = () => {
    const elapsed = (Date.now() - stats.startTime) / 60000;
    onEnd({ ...stats, elapsed, lastMode:"sentence" });
  };

  const target = sentences[idx] || "";

  const onChange = (e) => {
    const v = e.target.value;
    setInput(v);
    if (v === target) {
      const chars = getKoreanStrokes(v);
      setStats(p => ({ ...p, totalChars: p.totalChars+chars, correct: p.correct+1, score: p.score + chars*10 }));
      setInput("");
      if (idx+1 >= sentences.length) finish();
      else setIdx(p => p+1);
    }
  };

  const elapsed = (Date.now() - stats.startTime) / 60000;
  const cpm = Math.round(stats.totalChars / Math.max(elapsed, 0.01));

  // Character coloring
  const chars = [...target];
  const inputChars = [...input];

  return (
    <div style={{ paddingTop:12 }}>
      <GameHeader title="문장 연습" icon="📝" color="var(--blue)" onBack={finish} />
      <div className="stat-row">
        <StatBadge label="시간" value={`${timeLeft}초`} color={timeLeft<=10?"var(--red)":"var(--blue)"} />
        <StatBadge label="타수" value={`${cpm}`} color="var(--green)" />
        <StatBadge label="진행" value={`${idx+1}/${sentences.length}`} color="var(--gold)" />
        <StatBadge label="점수" value={stats.score} color="var(--purple)" />
      </div>

      <div className="progress-bar">
        <div className="fill" style={{ width:`${idx/sentences.length*100}%`, background:"linear-gradient(90deg, var(--blue), var(--green))" }} />
      </div>

      {/* Target */}
      <div className="card" style={{ margin:"16px 0", fontSize:"clamp(16px, 4.5vw, 22px)", lineHeight:2, letterSpacing:0.5, minHeight:70 }}>
        {chars.map((ch, i) => {
          let color = "rgba(255,255,255,0.25)";
          let fontWeight = 400;
          if (i < inputChars.length) {
            color = inputChars[i] === ch ? "var(--green)" : "var(--red)";
            fontWeight = 600;
          }
          const isCursor = i === inputChars.length;
          return (
            <span key={i} style={{
              color, fontWeight,
              borderBottom: isCursor ? "2px solid var(--blue)" : "none",
              transition:"color 0.1s"
            }}>{ch}</span>
          );
        })}
      </div>

      {/* Input */}
      <textarea ref={inputRef} className="text-input" value={input} onChange={onChange}
        placeholder="위 문장을 그대로 입력하세요..."
        rows={3}
        autoFocus autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false"
        style={{ textAlign:"left", lineHeight:1.8, resize:"none" }}
      />
    </div>
  );
}

// ═══════════════════════════════════════
//  FALLING WORDS MODE
// ═══════════════════════════════════════
function FallingMode({ difficulty, onEnd, stats, setStats }) {
  const [words, setWords] = useState([]);
  const [input, setInput] = useState("");
  const [timeLeft, setTimeLeft] = useState(90);
  const [lives, setLives] = useState(5);
  const [combo, setCombo] = useState(0);
  const [maxCombo, setMaxCombo] = useState(0);
  const [effects, setEffects] = useState([]);
  const [flash, setFlash] = useState("");
  const inputRef = useRef(null);
  const animRef = useRef(null);
  const lastSpawn = useRef(0);
  const wordId = useRef(0);
  const pool = useRef(shuffle(WORDS[difficulty].words));
  const poolIdx = useRef(0);
  const livesRef = useRef(5);
  const timeRef = useRef(90);

  const nextWord = () => {
    if (poolIdx.current >= pool.current.length) {
      pool.current = shuffle(WORDS[difficulty].words);
      poolIdx.current = 0;
    }
    return pool.current[poolIdx.current++];
  };

  const spawn = useCallback(() => {
    setWords(p => [...p, {
      id: wordId.current++,
      word: nextWord(),
      x: 8 + Math.random() * 78,
      y: -8,
      speed: 0.012 + Math.random() * 0.018
    }]);
  }, []);

  useEffect(() => {
    inputRef.current?.focus();
    spawn(); spawn();

    let lastTime = performance.now();
    const loop = (time) => {
      const dt = time - lastTime;
      lastTime = time;

      if (time - lastSpawn.current > 2400 - Math.min((90-timeRef.current)*12, 900)) {
        spawn();
        lastSpawn.current = time;
      }

      setWords(prev => {
        const alive = [];
        let missed = 0;
        for (const w of prev) {
          const ny = w.y + w.speed * dt * 0.055;
          if (ny > 108) missed++;
          else alive.push({ ...w, y: ny });
        }
        if (missed > 0) {
          livesRef.current = Math.max(0, livesRef.current - missed);
          setLives(livesRef.current);
          setCombo(0);
          setFlash("miss");
          setTimeout(() => setFlash(""), 300);
        }
        return alive;
      });

      if (livesRef.current > 0 && timeRef.current > 0) {
        animRef.current = requestAnimationFrame(loop);
      }
    };
    animRef.current = requestAnimationFrame(loop);
    return () => { if(animRef.current) cancelAnimationFrame(animRef.current); };
  }, []);

  useEffect(() => {
    if (lives <= 0 || timeLeft <= 0) {
      if(animRef.current) cancelAnimationFrame(animRef.current);
      const elapsed = (Date.now() - stats.startTime) / 60000;
      onEnd({ ...stats, elapsed, lastMode:"falling", maxCombo });
      return;
    }
    const t = setTimeout(() => { setTimeLeft(p => { timeRef.current = p-1; return p-1; }); }, 1000);
    return () => clearTimeout(t);
  }, [timeLeft, lives]);

  const submit = () => {
    const v = input.trim();
    if (!v) return;
    const mi = words.findIndex(w => w.word === v);
    if (mi !== -1) {
      const matched = words[mi];
      const chars = getKoreanStrokes(v);
      const nc = combo + 1;
      const bonus = Math.floor(nc / 5) * 50;
      const pts = chars * 10 + bonus;

      setEffects(p => [...p, { id:Date.now()+Math.random(), x:matched.x, y:matched.y, text:`+${pts}` }]);
      setTimeout(() => setEffects(p => p.slice(-5)), 900);

      setWords(p => p.filter((_,i) => i !== mi));
      setCombo(nc);
      setMaxCombo(p => Math.max(p, nc));
      setStats(p => ({
        ...p, totalChars:p.totalChars+chars, correct:p.correct+1, score:p.score+pts
      }));
      setFlash("hit");
    } else {
      setCombo(0);
      setStats(p => ({ ...p, wrong:p.wrong+1 }));
      setFlash("miss");
    }
    setTimeout(() => setFlash(""), 250);
    setInput("");
  };

  const elapsed = (Date.now()-stats.startTime)/60000;
  const cpm = Math.round(stats.totalChars/Math.max(elapsed,0.01));

  return (
    <div style={{ paddingTop:12 }}>
      <GameHeader title="낙하 게임" icon="🎮" color="var(--red)" onBack={() => {
        if(animRef.current) cancelAnimationFrame(animRef.current);
        onEnd({ ...stats, elapsed, lastMode:"falling", maxCombo });
      }} />

      <div className="stat-row">
        <StatBadge label="시간" value={`${timeLeft}초`} color={timeLeft<=15?"var(--red)":"var(--green)"} />
        <StatBadge label="타수" value={cpm} color="var(--blue)" />
        <StatBadge label="콤보" value={`${combo}x`} color={combo>=10?"var(--gold)":"var(--orange)"} />
        <StatBadge label="점수" value={stats.score} color="var(--purple)" />
      </div>

      {/* Lives */}
      <div style={{ textAlign:"center", marginBottom:8, fontSize:18, letterSpacing:4 }}>
        {Array.from({length:5}).map((_,i) => (
          <span key={i} style={{ opacity: i < lives ? 1 : 0.2, transition:"opacity 0.3s" }}>❤️</span>
        ))}
      </div>

      {/* Game Area */}
      <div style={{
        position:"relative", height:"clamp(300px, 55vh, 440px)", borderRadius:16,
        background:"rgba(0,0,0,0.3)", border:"1px solid var(--border)",
        overflow:"hidden", marginBottom:16,
        boxShadow: flash==="hit"?"inset 0 0 40px var(--green-glow)" : flash==="miss"?"inset 0 0 40px var(--red-glow)":"none",
        transition:"box-shadow 0.2s"
      }}>
        {/* Danger zone */}
        <div style={{
          position:"absolute", bottom:0, left:0, right:0, height:45,
          background:"linear-gradient(to top, rgba(248,113,113,0.12), transparent)",
          borderTop:"1px dashed rgba(248,113,113,0.25)"
        }}>
          <div style={{ textAlign:"center", paddingTop:14, fontSize:11, color:"var(--red)", opacity:0.5 }}>
            ⚠️ 위험 구역
          </div>
        </div>

        {/* Words */}
        {words.map(w => (
          <div key={w.id} style={{
            position:"absolute",
            left:`${w.x}%`, top:`${w.y}%`,
            transform:"translate(-50%,-50%)",
            padding:"7px 16px", borderRadius:10,
            background: w.y>70 ? "rgba(248,113,113,0.15)" : "rgba(34,197,94,0.08)",
            border:`1.5px solid ${w.y>70?"var(--red)":"rgba(34,197,94,0.25)"}`,
            color: w.y>70 ? "var(--red)" : "var(--text)",
            fontSize:"clamp(13px, 3.5vw, 16px)", fontWeight:600,
            whiteSpace:"nowrap",
            textShadow: w.y>70 ? "0 0 8px var(--red-glow)" : "none",
            transition:"background 0.5s, border-color 0.5s, color 0.5s"
          }}>
            {w.word}
          </div>
        ))}

        {/* Score effects */}
        {effects.map(e => (
          <div key={e.id} style={{
            position:"absolute", left:`${e.x}%`, top:`${e.y}%`,
            color:"var(--gold)", fontSize:18, fontWeight:900,
            fontFamily:"'JetBrains Mono', monospace",
            animation:"floatUp 0.8s ease-out forwards",
            pointerEvents:"none", zIndex:10
          }}>{e.text}</div>
        ))}

        {/* Combo indicator */}
        {combo >= 5 && (
          <div style={{
            position:"absolute", top:12, right:14,
            fontSize:20, fontWeight:900, color:"var(--gold)",
            fontFamily:"'JetBrains Mono', monospace",
            animation:"pulse 0.6s ease infinite",
            textShadow:"0 0 12px var(--gold-glow)"
          }}>🔥 {combo}x COMBO</div>
        )}
      </div>

      {/* Input */}
      <div style={{ maxWidth:440, margin:"0 auto" }}>
        <input ref={inputRef} className="text-input" value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if(e.key==="Enter") submit(); }}
          placeholder="단어 입력 → Enter"
          autoFocus autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false"
          style={{
            borderColor: combo>=10?"var(--gold)":flash==="hit"?"var(--green)":"var(--border)",
            boxShadow: combo>=10?"0 0 0 3px var(--gold-glow)":"none"
          }}
        />
      </div>
    </div>
  );
}

// ═══════════════════════════════════════
//  RESULT SCREEN
// ═══════════════════════════════════════
function ResultScreen({ stats, name, onBack, onRetry }) {
  const elapsed = stats.elapsed || 0.01;
  const cpm = Math.round(stats.totalChars / Math.max(elapsed, 0.01));
  const acc = (stats.correct+stats.wrong)>0 ? Math.round(stats.correct/(stats.correct+stats.wrong)*100) : 0;

  const getRank = () => {
    if (cpm >= 500 && acc >= 95) return { rank:"S", color:"var(--gold)", msg:"타자의 신! 🏆", bg:"var(--gold-glow)" };
    if (cpm >= 350 && acc >= 90) return { rank:"A", color:"var(--green)", msg:"대단해요! 🌟", bg:"var(--green-glow)" };
    if (cpm >= 250 && acc >= 80) return { rank:"B", color:"var(--blue)", msg:"잘하고 있어요! 👍", bg:"var(--blue-glow)" };
    if (cpm >= 150 && acc >= 70) return { rank:"C", color:"var(--orange)", msg:"조금만 더 연습! 💪", bg:"rgba(251,146,60,0.25)" };
    return { rank:"D", color:"var(--red)", msg:"꾸준히 연습하면 늘어요! 🌱", bg:"var(--red-glow)" };
  };

  const { rank, color, msg, bg } = getRank();

  const items = [
    { icon:"⌨️", label:"타자 속도", value:`${cpm} 타/분` },
    { icon:"🎯", label:"정확도", value:`${acc}%` },
    { icon:"🏆", label:"총 점수", value:stats.score.toLocaleString() },
    { icon:"✅", label:"성공", value:stats.correct },
    { icon:"❌", label:"실패", value:stats.wrong },
    { icon:"⏱️", label:"소요 시간", value:`${Math.round(elapsed*60)}초` },
  ];
  if (stats.maxCombo) items.push({ icon:"🔥", label:"최대 콤보", value:`${stats.maxCombo}x` });

  return (
    <div style={{ paddingTop:30, textAlign:"center" }}>
      {/* New Record */}
      {stats.newRecord && (
        <div className="anim-pop" style={{
          display:"inline-block", padding:"6px 20px", borderRadius:20,
          background:"var(--gold-glow)", border:"1px solid var(--gold)",
          color:"var(--gold)", fontSize:14, fontWeight:700, marginBottom:16
        }}>🎉 새 기록 달성!</div>
      )}

      {/* Rank */}
      <div className="anim-pop" style={{ marginBottom:24 }}>
        <div style={{
          display:"inline-flex", alignItems:"center", justifyContent:"center",
          width:110, height:110, borderRadius:"50%",
          background:bg, border:`3px solid ${color}`,
          boxShadow:`0 0 60px ${bg}`,
          fontFamily:"'JetBrains Mono', monospace",
          fontSize:56, fontWeight:900, color
        }}>{rank}</div>
        <div style={{ marginTop:14, fontSize:20, fontWeight:700, color }}>{msg}</div>
        {name && <div style={{ fontSize:13, color:"var(--text-dim)", marginTop:4 }}>{name}님의 결과</div>}
      </div>

      {/* Stats Grid */}
      <div style={{
        display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(120px, 1fr))",
        gap:10, marginBottom:32
      }}>
        {items.map((s, i) => (
          <div key={i} className="card anim-up" style={{ padding:14, textAlign:"center", animationDelay:`${i*0.05}s` }}>
            <div style={{ fontSize:22, marginBottom:4 }}>{s.icon}</div>
            <div style={{ fontSize:18, fontWeight:700, color:"var(--text)" }}>{s.value}</div>
            <div style={{ fontSize:11, color:"var(--text-dim)", marginTop:2 }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Buttons */}
      <div style={{ display:"flex", gap:10, justifyContent:"center", flexWrap:"wrap" }}>
        <button className="btn btn-primary" onClick={onRetry} style={{ minWidth:140 }}>🔄 다시 도전</button>
        <button className="btn btn-secondary" onClick={onBack} style={{ minWidth:140 }}>📋 메뉴로</button>
      </div>

      {/* Encouragement */}
      <div className="card" style={{ marginTop:28, fontSize:13, color:"var(--text-dim)", lineHeight:1.8 }}>
        {cpm < 200
          ? "💬 정확하게 치는 습관을 먼저 만들고, 속도는 자연스럽게 따라옵니다. 오늘 연습한 것만으로도 충분히 잘하고 있어요!"
          : cpm < 350
          ? "💬 실력이 꽤 좋아요! 좀 더 빠르게 치는 연습을 해보세요. 목표는 350타/분!"
          : "💬 엄청난 실력이에요! 이 정도면 타자 달인이라 불러도 손색없습니다. 🎖️"
        }
      </div>
    </div>
  );
}
